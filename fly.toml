app = "invoiceparser-api"
primary_region = "mia"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/invoiceparser.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "invoiceparser_data"
  destination = "/data"
